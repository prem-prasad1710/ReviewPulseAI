# Run from this directory so Compose does not load the app root .env (avoids macOS
# "operation not permitted" when an external docker-compose tries to read .env):
#   cd infra/local-mongo && podman compose -f compose.yml up -d
#
# Or from repo root:
#   npm run mongo:local:compose-up
services:
  mongo:
    image: docker.io/library/mongo:7
    restart: unless-stopped
    ports:
      # 27018 on host avoids "address already in use" when brew/system Mongo uses 27017
      - '127.0.0.1:27018:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: localuser
      MONGO_INITDB_ROOT_PASSWORD: localuser
